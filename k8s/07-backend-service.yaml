# Wave 3 Expose backend API service within the cluster
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: skillpulse
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app: backend
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080