# Wave 6 Expose frontend web service within the cluster
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: skillpulse
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  labels:
    app: frontend
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80