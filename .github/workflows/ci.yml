name: Platform CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  TAG: ${{ github.sha }}

jobs:

  security gate:
    name: Security Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: gitleaks/gitleaks-action@v2

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
          failure-threshold: warning

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile
          failure-threshold: warning

  go-audit:
    name: Go Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd backend
          govulncheck ./...

  build-backend:
    name: Backend Image Build
    runs-on: ubuntu-latest
    needs: [security gate, go-audit]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Short Tag
        run: echo "SHORT=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Build Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/skillpulse-backend:${{ env.SHORT }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  scan-backend:
    name: Backend Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/skillpulse-backend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  push-backend:
    name: Backend Publish
    runs-on: ubuntu-latest
    needs: scan-backend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: |
          docker push $REGISTRY/skillpulse-backend:${TAG:0:7}

  build-frontend:
    name: Frontend Image Build
    runs-on: ubuntu-latest
    needs: [security gate, go-audit]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Short Tag
        run: echo "SHORT=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          push: false
          tags: ${{ env.REGISTRY }}/skillpulse-frontend:${{ env.SHORT }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  scan-frontend:
    name: Frontend Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/skillpulse-frontend:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  push-frontend:
    name: Frontend Publish
    runs-on: ubuntu-latest
    needs: scan-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - run: |
          docker push $REGISTRY/skillpulse-frontend:${TAG:0:7}