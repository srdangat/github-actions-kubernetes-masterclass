name: CI Pipeline

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "k8s/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:

  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Docker Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  go-security:
    name: Go Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
      - name: Run checks
        run: |
          cd backend
          go vet ./...
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [secrets, lint, go-security]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Set SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/skillpulse-backend:${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/skillpulse-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/skillpulse-backend:buildcache,mode=max

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/skillpulse-backend:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Push Image
        run: docker push ${{ env.REGISTRY }}/skillpulse-backend:${{ env.SHORT_SHA }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [secrets, lint, go-security]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Set SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: ${{ env.REGISTRY }}/skillpulse-frontend:${{ env.SHORT_SHA }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/skillpulse-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/skillpulse-frontend:buildcache,mode=max

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/skillpulse-frontend:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Push Image
        run: docker push ${{ env.REGISTRY }}/skillpulse-frontend:${{ env.SHORT_SHA }}