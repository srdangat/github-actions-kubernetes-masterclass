name: CI Pipeline (Security + Build)

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "k8s/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

jobs:

  secrets:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true

  sast:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Semgrep Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci

  lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Backend Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - name: Frontend Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  go-security:
    name: Go Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: |
            backend/go.mod
            backend/go.sum

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Go Vet
        working-directory: backend
        run: go vet ./...

      - name: Govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest 
          govulncheck -mode=source ./...


  build:
    name: Build + Scan + Push Docker Images
    runs-on: ubuntu-latest
    needs: [secrets, sast, lint, go-security]

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Set Image Name
        run: echo "IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-${{ matrix.service }}" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          load: true
          tags: |
            ${{ env.IMAGE }}:${{ env.SHORT_SHA }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.SHORT_SHA }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Push Image
        if: success()
        run: |
          docker push ${{ env.IMAGE }}:${{ env.SHORT_SHA }}
          docker push ${{ env.IMAGE }}:latest

  summary:
    name: CI Summary (Security + Build Status)
    runs-on: ubuntu-latest
    needs: [secrets, sast, lint, go-security, build]
    if: always()

    steps:
      - name: Generate CI Summary
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Security Checks" >> $GITHUB_STEP_SUMMARY
          echo "- Secrets Scan (Gitleaks): ${{ needs.secrets.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SAST Scan (Semgrep): ${{ needs.sast.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dockerfile Lint: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Go Security: ${{ needs.go-security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### Build Status (Matrix)" >> $GITHUB_STEP_SUMMARY
          echo "- Backend + Frontend Build: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY