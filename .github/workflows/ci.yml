name: CI Pipeline

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "k8s/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true


  lint:
    runs-on: ubuntu-latest
    needs: [secrets]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile


  go-security:
    runs-on: ubuntu-latest
    needs: [secrets]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Go Mod Download
        working-directory: backend
        run: go mod download

      - name: Go Vet
        working-directory: backend
        run: go vet ./...

      - name: Install Govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1

      - name: Run Govulncheck
        working-directory: backend
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          govulncheck -mode=source ./...


  sast:
    runs-on: ubuntu-latest
    needs: [secrets]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: semgrep/semgrep-action@v1
        with:
          config: p/ci


  build:
    runs-on: ubuntu-latest
    needs: [secrets, lint, go-security]

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set Short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV

      - name: Set Image Name
        run: echo "IMAGE=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/skillpulse-${{ matrix.service }}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          load: true
          tags: ${{ env.IMAGE }}:${{ env.SHORT_SHA }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Push Image
        run: docker push ${{ env.IMAGE }}:${{ env.SHORT_SHA }}