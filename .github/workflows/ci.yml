name: CI Pipeline

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "k8s/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:

jobs:

  secrets:
    name: Secrets Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    needs: [secrets]
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  go-security:
    name: Go Security Checks
    runs-on: ubuntu-latest
    needs: [secrets]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache: true

      - name: Go Checks
        working-directory: backend
        run: |
          go vet ./...
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: [secrets, lint, go-security]

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Build Image
        run: |
          docker build \
            -t skillpulse-${{ matrix.service }}:${SHORT_SHA} \
            ./${{ matrix.service }}

  trivy:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: skillpulse-${{ matrix.service }}:${{ env.SHORT_SHA }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

  push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: trivy

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Set Short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag + Push Image
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/skillpulse-${{ matrix.service }}

          docker tag skillpulse-${{ matrix.service }}:${SHORT_SHA} \
            $IMAGE:${SHORT_SHA}

          docker push $IMAGE:${SHORT_SHA}